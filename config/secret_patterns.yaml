# RCGov secret-detection patterns
# SPDX-License-Identifier: AGPL-3.0-or-later
# Copyright (c) MOBIUS.LLC / Taiko Toeda
#
# Extends the built-in floor in src/rcgov/scan/secrets.py. Each entry is a named
# regex; a match routes the segment to the Safety Gate (quarantine), which
# relevance can never override (paper §3.1).
#
# The entropy backstop (config below) catches long high-entropy tokens that no
# named pattern matched.

patterns:
  - id: aws_access_key
    regex: "AKIA[0-9A-Z]{16}"
  - id: aws_secret_key
    regex: "(?i)aws_secret_access_key\\s*[:=]\\s*['\"]?[A-Za-z0-9/+=]{40}"
  - id: gcp_api_key
    regex: "AIza[0-9A-Za-z_\\-]{35}"
  - id: github_pat
    regex: "ghp_[0-9A-Za-z]{36}"
  - id: github_fine_grained
    regex: "github_pat_[0-9A-Za-z_]{22,}"
  - id: slack_token
    regex: "xox[baprs]-[0-9A-Za-z-]{10,}"
  - id: openai_key
    regex: "sk-[A-Za-z0-9]{20,}"
  - id: private_key_block
    regex: "-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----"
  - id: jwt
    regex: "eyJ[A-Za-z0-9_\\-]+\\.eyJ[A-Za-z0-9_\\-]+\\.[A-Za-z0-9_\\-]+"
  - id: generic_assignment
    regex: "(?i)(?:api[_-]?key|secret|passwd|password|token)\\s*[:=]\\s*['\"]?[^\\s'\"]{8,}"

entropy:
  # Shannon entropy backstop (bits/char). Random base64 sits near 5-6.
  min_token_length: 20
  threshold_bits_per_char: 4.0
